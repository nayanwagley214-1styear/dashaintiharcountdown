<style>

  justify-content: center;
  align-items: flex-start;
  gap: clamp(2px, 1.2vw, 12px);
  width: 100%;
}

.time-segment {

  flex-direction: column;
  align-items: center;
  flex: 1;

}

.num {

  text-align: center;

}

.colon {

  color: var(--text-muted);
  opacity: 0.4;
  line-height: 1.1;
  padding-top: 2px;

}

.segment-label {

  color: var(--text-secondary);

  text-transform: uppercase;
  letter-spacing: clamp(1px, 0.2vw, 1.5px);

}

footer {

.icon-link {

#confetti-canvas {

.fade-in {

@keyframes fadeInUp {

/* Landscape compact layouts for short viewports */

<script>
const f={dashain:new Date("2026-10-11T00:00:00"),tihar:new Date("2026-11-07T00:00:00")};
let cur="dashain";
const dBtn=document.getElementById("dBtn"),tBtn=document.getElementById("tBtn");
const dynamicTitle=document.getElementById("dynamic-title");
const currentDateDisplay=document.getElementById("current-date-display");

const daysElement = document.getElementById("days");
const hrsElement = document.getElementById("hrs");
const minElement = document.getElementById("min");
const secElement = document.getElementById("sec");

function sel(x){
  cur=x;
  dBtn.classList.toggle("active",x==="dashain");
  tBtn.classList.toggle("active",x==="tihar");
  dynamicTitle.textContent = "Countdown to " + x.charAt(0).toUpperCase() + x.slice(1);
  upd();
}
dBtn.onclick=()=>sel("dashain");tBtn.onclick=()=>sel("tihar");

const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let confettiActive = false;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function triggerCelebration() {
  if (confettiActive) return;
  confettiActive = true;
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 0.5) * 14 - 4,
      color: ['#FFD54F', '#FFA000', '#FFC107', '#FFFFFF', '#E53935'][Math.floor(Math.random() * 5)],
      size: Math.random() * 6 + 4,
      rotation: Math.random() * 360,
      rSpeed: Math.random() * 8 - 4
    });
  }
  animateConfetti();
}

function animateConfetti() {
  if (particles.length === 0) {
    confettiActive = false;
    return;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18; 
    p.rotation += p.rSpeed;
    ctx.fillStyle = p.color;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    ctx.restore();
    if (p.y > window.innerHeight || p.x < 0 || p.x > window.innerWidth) {
      particles.splice(i, 1);
    }
  }
  requestAnimationFrame(animateConfetti);
}

function upd(){
  const t=f[cur],n=new Date(),diff=Math.max(0,Math.floor((t-n)/1000));
  const d=Math.floor(diff/86400),h=Math.floor(diff%86400/3600),m=Math.floor(diff%3600/60),s=diff%60;
  
  daysElement.textContent=d;
  hrsElement.textContent=String(h).padStart(2,"0");
  minElement.textContent=String(m).padStart(2,"0");
  secElement.textContent=String(s).padStart(2,"0");

  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const formattedToday = n.toLocaleDateString('en-US', options).replace(/,/g, ' •');
  currentDateDisplay.textContent = formattedToday;

  if (diff === 0) {
    triggerCelebration();
  }
}
upd();
setInterval(upd,1000);
</script>
